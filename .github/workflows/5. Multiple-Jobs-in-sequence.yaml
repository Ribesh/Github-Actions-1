name: 5. Multiple Jobs in Sequence

on: push


jobs:
  build_job_1:
    runs-on: ubuntu-latest
    steps:
      - name: Install Cowsay
        run: sudo apt-get install cowsay -y

      - name: Generate Message
        run:  cowsay -f dragon "Run for cover, I am a DRAGON..... RAWR" >> dragon.txt

      - name: Pause of 30 seconds
        run:  sleep 10

  test_job_2:
    needs: build_job_1
    runs-on: ubuntu-latest
    steps:
      - name: Pause for 10 seconds
        run:  sleep 10

      - name: Verify file Exists
        run:  test -f dragon.txt

  deploy_job_3:
    needs: test_job_2
    runs-on: ubuntu-latest
    steps:
      - name: Read File
        run: cat dragon.txt

      - name: Deploy 
        run: echo "Deploying...." 